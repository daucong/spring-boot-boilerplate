version: "3.9"

services:

  # ==================== DATABASE ====================
  postgresql:
    image: postgres:16.2
    container_name: local-postgres
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c 'max_connections=1000'
    networks:
      - local

  # ==================== REDIS ====================
  redis:
    image: redis:7.2-alpine
    container_name: local-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - local

  redis-insight:
    image: redis/redisinsight:latest
    container_name: local-redis-insight
    restart: always
    ports:
      - "5540:5540"
    networks:
      - local

  # ==================== KAFKA ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: local-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - local

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: local-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://local-kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "local-kafka:29092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - local

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: local-kafka-ui
    restart: always
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: local-kafka:29092
    networks:
      - local

  # ==================== RABBITMQ ====================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: local-rabbitmq
    restart: always
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - local

  # ==================== SERVICES ====================
  app-java:
    image: localhost:5000/app-java
    ports:
      - "1010:8080"
    build:
      context: app-java
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - local
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    deploy:
      mode: replicated
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  local:
    name: local